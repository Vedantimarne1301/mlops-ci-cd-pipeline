name: MLOps CI/CD Pipeline

# Trigger on every push to main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ── Job 1: Run Tests ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model (needed before tests)
        run: python app/model.py

      - name: Run pytest
        run: pytest app/test_predict.py -v

  # ── Job 2: Build Docker Image ─────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test        # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mlops-model:latest .

      - name: Verify container starts
        run: |
          docker run -d -p 5000:5000 --name test_container mlops-model:latest
          sleep 5
          curl http://localhost:5000/health
          docker stop test_container

  # ── Job 3: Deploy to Testing Environment ─────────────────
  deploy:
    name: Deploy to Testing
    runs-on: ubuntu-latest
    needs: build       # only runs if build passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy simulation
        run: |
          echo "Deploying mlops-model:latest to testing environment..."
          echo "Environment : testing"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deploy successful!"

      - name: Notify deployment status
        run: echo "Pipeline complete - model deployed to testing!"